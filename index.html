<!DOCTYPE html>
<html>
<head>
<title>Security Scan</title>
<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial, sans-serif;
  color:white;
}

.alert{
  position:absolute;
  background:#ff0033;
  padding:15px 20px;
  border-radius:8px;
  font-weight:bold;
  animation:pop 0.3s ease;
}

@keyframes pop{
  from{transform:scale(0);}
  to{transform:scale(1);}
}

#final{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:50px;
  display:none;
  text-align:center;
  color:#00ff88;
}
</style>
</head>

<body>

<div id="final">😆 HAPPY APRIL FOOLS DAY 😆</div>

<script>

let interval = setInterval(() => {

  let alertBox = document.createElement("div");
  alertBox.className="alert";
  alertBox.innerText="⚠ VIRUS DETECTED ⚠";

  alertBox.style.top=Math.random()*window.innerHeight+"px";
  alertBox.style.left=Math.random()*window.innerWidth+"px";

  document.body.appendChild(alertBox);

},150);

setTimeout(()=>{
  clearInterval(interval);
  document.body.innerHTML="";
  document.getElementById("final").style.display="block";
},5000);

</script>

</body>
</html>
