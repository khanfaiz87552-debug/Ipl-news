<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Scan</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
color:white;
}

.alert{
position:absolute;
background:red;
color:white;
padding:20px 30px;
font-size:35px;
font-weight:bold;
border-radius:10px;
box-shadow:0 0 20px red;
animation:pop 0.15s;
}

@keyframes pop{
from{transform:scale(0)}
to{transform:scale(1)}
}

#final{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:70px;
text-align:center;
color:#00ff88;
display:none;
}

</style>
</head>

<body onclick="startPrank()">

<div id="final">😆 HAPPY APRIL FOOLS DAY 😆</div>

<script>

function startPrank(){

// Fullscreen (hides status bar)
document.documentElement.requestFullscreen().catch(()=>{});

let spam = setInterval(()=>{

let alertBox=document.createElement("div");

alertBox.className="alert";

alertBox.innerText="⚠ VIRUS DETECTED ⚠";

alertBox.style.top=Math.random()*window.innerHeight+"px";
alertBox.style.left=Math.random()*window.innerWidth+"px";

document.body.appendChild(alertBox);

},40); // VERY FAST

setTimeout(()=>{

clearInterval(spam);

document.body.innerHTML="";

let final=document.createElement("div");

final.innerHTML="😆<br>HAPPY APRIL FOOLS DAY<br>😆";

final.style.position="fixed";
final.style.top="50%";
final.style.left="50%";
final.style.transform="translate(-50%,-50%)";
final.style.fontSize="80px";
final.style.color="#00ff88";
final.style.textAlign="center";

document.body.appendChild(final);

},6000);

}

</script>

</body>
</html>
